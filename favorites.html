<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Favorites - MealMatch</title>
    <link rel="stylesheet" href="/src/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700&family=Poppins:wght@600;700&display=swap" rel="stylesheet">
</head>
<body>
    <header class="header">
        <div class="container">
            <div class="logo">
                <h1 class="logo-text">MealMatch</h1>
            </div>
            <nav class="nav">
                <a href="/" class="nav-link">Search</a>
                <a href="/planner.html" class="nav-link">Planner</a>
                <a href="/favorites.html" class="nav-link active">Favorites</a>
            </nav>
        </div>
    </header>

    <main class="main">
        <div class="container">
            <section class="favorites-header">
                <h2 class="section-title">My Favorite Recipes</h2>
                <div class="favorites-actions">
                    <button id="exportFavoritesBtn" class="btn btn-primary">Export Favorites</button>
                    <button id="clearFavoritesBtn" class="btn btn-outline">Clear All</button>
                </div>
            </section>

            <section id="favoritesContainer" class="favorites-container">
                <!-- Favorite items will be dynamically inserted here -->
            </section>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <p>&copy; 2026 MealMatch. Making healthy eating easier.</p>
        </div>
    </footer>

    <script type="module" src="/src/main.js"></script>
</body>
</html>
