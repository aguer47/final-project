<!DOCTYPE html>
<html>
<head>
    <title>Recipe Test</title>
</head>
<body>
    <h1>Testing Recipe API</h1>
    <div id="test-results"></div>
    
    <script>
        async function testRecipeAPI() {
            const results = document.getElementById('test-results');
            
            // Test multiple recipe IDs
            const testIds = ['52772', '52893', '52768', '53359'];
            
            for (const id of testIds) {
                try {
                    const response = await fetch(`https://www.themealdb.com/api/json/v1/1/lookup.php?i=${id}`);
                    const data = await response.json();
                    
                    results.innerHTML += `<p>Recipe ID ${id}: ${data.meals ? data.meals[0]?.strMeal || 'No name' : 'Not found'}</p>`;
                } catch (error) {
                    results.innerHTML += `<p>Recipe ID ${id}: Error - ${error.message}</p>`;
                }
            }
        }
        
        testRecipeAPI();
    </script>
</body>
</html>
