<!DOCTYPE html>
<html>
<head>
    <title>Debug Recipe Loading</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .test { margin: 10px 0; padding: 10px; border: 1px solid #ccc; }
        .success { background-color: #d4edda; }
        .error { background-color: #f8d7da; }
        .loading { background-color: #fff3cd; }
    </style>
</head>
<body>
    <h1>Debug Recipe Loading Issues</h1>
    <div id="results"></div>
    
    <script>
        async function debugRecipeLoading() {
            const results = document.getElementById('results');
            
            // Test 1: API Connectivity
            results.innerHTML += '<div class="test loading">Testing API connectivity...</div>';
            try {
                const response = await fetch('https://www.themealdb.com/api/json/v1/1/search.php?s=chicken');
                const data = await response.json();
                results.innerHTML += `<div class="test success">API Connected: Found ${data.meals ? data.meals.length : 0} chicken recipes</div>`;
                
                if (data.meals && data.meals.length > 0) {
                    const validRecipeId = data.meals[0].idMeal;
                    results.innerHTML += `<div class="test success">Valid Recipe ID found: ${validRecipeId} - ${data.meals[0].strMeal}</div>`;
                    
                    // Test 2: Recipe Details
                    results.innerHTML += '<div class="test loading">Testing recipe details...</div>';
                    const detailResponse = await fetch(`https://www.themealdb.com/api/json/v1/1/lookup.php?i=${validRecipeId}`);
                    const detailData = await detailResponse.json();
                    
                    if (detailData.meals && detailData.meals.length > 0) {
                        results.innerHTML += `<div class="test success">Recipe Details Loaded: ${detailData.meals[0].strMeal}</div>`;
                    } else {
                        results.innerHTML += '<div class="test error">Recipe Details Failed: No meals found</div>';
                    }
                }
            } catch (error) {
                results.innerHTML += `<div class="test error">API Connection Failed: ${error.message}</div>`;
            }
            
            // Test 3: Invalid Recipe ID
            results.innerHTML += '<div class="test loading">Testing invalid recipe ID...</div>';
            try {
                const invalidResponse = await fetch('https://www.themealdb.com/api/json/v1/1/lookup.php?i=99999');
                const invalidData = await invalidResponse.json();
                results.innerHTML += `<div class="test success">Invalid ID handled correctly: ${invalidData.meals ? 'Found meals' : 'No meals found'}</div>`;
            } catch (error) {
                results.innerHTML += `<div class="test error">Invalid ID test failed: ${error.message}</div>`;
            }
            
            // Test 4: CORS Issues
            results.innerHTML += '<div class="test loading">Testing CORS...</div>';
            try {
                const corsResponse = await fetch('https://www.themealdb.com/api/json/v1/1/search.php?s=test', {
                    mode: 'cors'
                });
                results.innerHTML += `<div class="test success">CORS OK: Status ${corsResponse.status}</div>`;
            } catch (error) {
                results.innerHTML += `<div class="test error">CORS Issue: ${error.message}</div>`;
            }
        }
        
        debugRecipeLoading();
    </script>
</body>
</html>
