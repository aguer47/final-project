<!DOCTYPE html>
<html>
<head>
    <title>Recipe ID Test</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .result { margin: 10px 0; padding: 10px; border: 1px solid #ccc; }
        .found { background-color: #d4edda; }
        .not-found { background-color: #f8d7da; }
        .error { background-color: #fff3cd; }
    </style>
</head>
<body>
    <h1>Testing TheMealDB Recipe IDs</h1>
    <div id="results"></div>
    
    <script>
        async function testRecipeIds() {
            const results = document.getElementById('results');
            const testIds = ['53359', '53036', '52772', '52893', '52768', '52874', '52878'];
            
            for (const id of testIds) {
                const resultDiv = document.createElement('div');
                resultDiv.className = 'result';
                
                try {
                    const response = await fetch(`https://www.themealdb.com/api/json/v1/1/lookup.php?i=${id}`);
                    const data = await response.json();
                    
                    if (data.meals && data.meals.length > 0) {
                        const recipe = data.meals[0];
                        resultDiv.className += ' found';
                        resultDiv.innerHTML = `
                            <strong>Recipe ID ${id}: FOUND</strong><br>
                            Name: ${recipe.strMeal}<br>
                            Category: ${recipe.strCategory}<br>
                            Area: ${recipe.strArea}
                        `;
                    } else {
                        resultDiv.className += ' not-found';
                        resultDiv.innerHTML = `<strong>Recipe ID ${id}: NOT FOUND</strong>`;
                    }
                } catch (error) {
                    resultDiv.className += ' error';
                    resultDiv.innerHTML = `<strong>Recipe ID ${id}: ERROR</strong><br>${error.message}`;
                }
                
                results.appendChild(resultDiv);
            }
            
            // Also test search to get valid IDs
            results.innerHTML += '<h2>Valid Recipe IDs from Search:</h2>';
            try {
                const searchResponse = await fetch('https://www.themealdb.com/api/json/v1/1/search.php?s=chicken');
                const searchData = await searchResponse.json();
                
                if (searchData.meals) {
                    searchData.meals.slice(0, 5).forEach(recipe => {
                        const validDiv = document.createElement('div');
                        validDiv.className = 'result found';
                        validDiv.innerHTML = `
                            <strong>Valid ID: ${recipe.idMeal}</strong><br>
                            Name: ${recipe.strMeal}
                        `;
                        results.appendChild(validDiv);
                    });
                }
            } catch (error) {
                results.innerHTML += `<div class="result error">Search error: ${error.message}</div>`;
            }
        }
        
        testRecipeIds();
    </script>
</body>
</html>
