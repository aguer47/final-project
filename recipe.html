<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recipe Details - MealMatch</title>
    <link rel="icon" type="image/x-icon" href="images/icons/favicon.ico">
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700&family=Poppins:wght@600;700&display=swap" rel="stylesheet">
</head>
<body>
    <header class="header">
        <div class="container">
            <div class="logo">
                <img src="images/logos/logo.jpg" alt="MealMatch Logo" class="logo-img">
            </div>
            <nav class="nav">
                <a href="index.html" class="nav-link">Search</a>
                <a href="planner.html" class="nav-link">Planner</a>
            </nav>
        </div>
    </header>

    <main class="main">
        <div class="container">
            <!-- Back Button -->
            <div class="back-nav">
                <a href="index.html" class="back-btn">← Back to Search</a>
            </div>

            <!-- Recipe Detail Section -->
            <section id="recipeDetail" class="recipe-detail">
                <!-- Recipe details will be dynamically inserted here -->
                <div class="loading-placeholder">
                    <p>Loading recipe details...</p>
                </div>
            </section>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <p>&copy; 2026 MealMatch. Making healthy eating easier.</p>
        </div>
    </footer>

    <!-- JavaScript Files -->
    <script src="api.js"></script>
    <script src="favorites.js"></script>
    <script src="main.js"></script>
</body>
</html>
